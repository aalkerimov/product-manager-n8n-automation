name: Validate Workflows

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: Validate workflow files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate JSON syntax
        run: node scripts/validate-json.js

      - name: Check for accidental secrets
        run: node scripts/check-secrets.js

      - name: Check required files exist
        run: node scripts/check-required-files.js

      - name: Verify docker-compose syntax
        run: |
          docker compose config --quiet
        env:
          COMPOSE_FILE: docker-compose.yml

      - name: All checks passed
        run: echo "✅ All validation checks passed."
